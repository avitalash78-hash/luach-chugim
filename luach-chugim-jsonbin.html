<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח הודעות לחוגים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Suez+One&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F1E7;
    --ink:#20241F;
    --teal:#1F4E45;
    --teal-light:#3C7A6B;
    --coral:#E8633E;
    --sand:#EDE3CF;
    --sand-line:#DCCFB0;
    --stage-bg:#13181A;
    --stage-bg-2:#0E1213;
    --white:#FFFFFF;
    --radius:14px;
    --shadow:0 2px 10px rgba(32,36,31,0.08);
    --shadow-lg:0 12px 40px rgba(0,0,0,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Rubik',system-ui,sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display-face{font-family:'Suez One','Rubik',serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;font-size:15px;}
  .hidden{display:none !important;}

  /* ===== App shell ===== */
  #app{min-height:100vh;}

  /* ===== ADMIN ===== */
  .admin-wrap{max-width:1180px;margin:0 auto;padding:0 22px 60px;}
  .topbar{
    background:var(--teal);
    color:var(--cream);
    padding:18px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
  }
  .topbar-inner{max-width:1180px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-logo{height:40px;width:auto;display:block;}
  .brand h1{font-size:19px;margin:0;font-weight:700;letter-spacing:0.2px;}
  .brand span.sub{display:block;font-size:12.5px;color:var(--sand);font-weight:400;opacity:0.85;}
  .topbar-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    height:42px;padding:0 16px;border-radius:10px;font-size:14.5px;font-weight:600;
    box-sizing:border-box;white-space:nowrap;
    transition:transform .12s ease, opacity .15s ease;
  }
  .btn svg{width:16px;height:16px;flex-shrink:0;}
  .btn:active{transform:scale(0.97);}
  .btn-coral{background:var(--coral);color:#fff;}
  .btn-coral:hover{opacity:0.92;}
  .btn-ghost-light{background:rgba(255,255,255,0.12);color:var(--cream);}
  .btn-ghost-light:hover{background:rgba(255,255,255,0.2);}
  .btn-outline{background:transparent;border:1.5px solid var(--sand-line);color:var(--ink);}
  .btn-outline:hover{background:var(--sand);}
  .btn-text{color:var(--teal);font-weight:600;padding:8px 10px;}
  .btn-icon{width:38px;height:38px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .btn-icon:hover{background:var(--sand);}
  .btn-icon svg{width:18px;height:18px;}

  .toolbar{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    margin:26px 0 18px;flex-wrap:wrap;
  }
  .toolbar-left{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .filter-select{
    height:42px;box-sizing:border-box;padding:0 12px;border-radius:10px;border:1.5px solid var(--sand-line);
    background:var(--white);color:var(--ink);font-size:14px;
  }

  .cards-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
    gap:16px;
  }
  .card{
    background:var(--white);border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow);border:1px solid var(--sand-line);
    display:flex;flex-direction:column;
  }
  .card-media{
    height:140px;background:var(--sand);position:relative;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .card-media img,.card-media video{width:100%;height:100%;object-fit:cover;}
  .card-media .media-empty{color:var(--teal-light);opacity:0.5;}
  .card-media .media-empty svg{width:34px;height:34px;}
  .card-badge{
    position:absolute;top:9px;right:9px;
    font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:20px;color:#fff;
  }
  .status-active{background:var(--teal);}
  .status-scheduled{background:#9A7B2E;}
  .status-ended{background:#8A8378;}
  .status-off{background:#B4ABA0;}
  .card-body{padding:13px 14px 8px;flex:1;display:flex;flex-direction:column;gap:6px;}
  .card-cat{font-size:11.5px;font-weight:600;color:var(--coral);}
  .card-title{font-size:16px;font-weight:700;margin:0;line-height:1.3;}
  .card-text{font-size:13px;color:#5A5F54;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-dates{font-size:12px;color:#8A8378;margin-top:auto;}
  .card-actions{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 8px 10px;border-top:1px solid var(--sand);
  }
  .card-actions .group{display:flex;gap:2px;}

  .empty-state{
    text-align:center;padding:70px 20px;color:#7A8077;
  }
  .empty-state svg{width:56px;height:56px;margin-bottom:14px;opacity:0.5;}
  .empty-state h3{margin:0 0 6px;color:var(--ink);font-size:18px;}
  .empty-state p{margin:0 0 18px;font-size:14px;}

  /* ===== Modal ===== */
  .overlay{
    position:fixed;inset:0;background:rgba(20,22,18,0.55);
    display:flex;align-items:center;justify-content:center;padding:20px;
    z-index:50;
  }
  .modal{
    background:var(--white);border-radius:18px;max-width:560px;width:100%;
    max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);
  }
  .modal-sm{max-width:400px;}
  .modal-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 22px;border-bottom:1px solid var(--sand);
  }
  .modal-head h2{font-size:18px;margin:0;}
  .modal-body{padding:20px 22px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13.5px;font-weight:600;margin-bottom:6px;color:#454A40;}
  .field .hint{font-size:12px;color:#9A9486;margin-top:4px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field textarea,.field select{
    width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--sand-line);
    background:var(--cream);color:var(--ink);
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--teal-light);outline-offset:1px;}
  .field textarea{resize:vertical;min-height:64px;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .field-error{color:var(--coral);font-size:13.5px;font-weight:600;margin-top:4px;}
  .field-error:not(:empty){background:#FDEFE9;padding:9px 12px;border-radius:8px;margin-bottom:6px;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;
    background:var(--cream);padding:11px 14px;border-radius:10px;margin-bottom:16px;}
  .toggle-row label{font-size:14px;font-weight:600;margin:0;}
  .switch{position:relative;width:44px;height:25px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider-track{position:absolute;inset:0;background:#C9C2B3;border-radius:30px;transition:.2s;}
  .slider-track:before{content:"";position:absolute;width:19px;height:19px;border-radius:50%;background:#fff;top:3px;right:3px;transition:.2s;}
  .switch input:checked + .slider-track{background:var(--teal);}
  .switch input:checked + .slider-track:before{transform:translateX(-19px);}
  .modal-foot{padding:16px 22px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--sand);}
  .cat-chip-list{display:flex;flex-wrap:wrap;gap:8px;}
  .cat-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--cream);border:1.5px solid var(--sand-line);
    padding:6px 6px 6px 12px;border-radius:20px;font-size:13.5px;font-weight:500;
  }
  .cat-chip button{
    width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    color:var(--coral);flex-shrink:0;
  }
  .cat-chip button:hover{background:#FDEFE9;}
  .cat-chip button svg{width:12px;height:12px;}

  /* ===== Toast ===== */
  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--ink);color:var(--cream);padding:11px 20px;border-radius:30px;
    font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;
    transition:opacity .25s ease, transform .25s ease;z-index:80;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== DISPLAY MODE ===== */
  #displayRoot{
    position:fixed;inset:0;background:radial-gradient(circle at 50% 0%, var(--stage-bg) 0%, var(--stage-bg-2) 100%);
    color:#fff;display:flex;flex-direction:column;overflow:hidden;
  }
  .disp-topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:clamp(14px,2.4vh,26px) clamp(20px,3vw,46px) 0;
    flex-shrink:0;
  }
  .disp-brand{display:flex;align-items:center;gap:10px;opacity:0.92;}
  .disp-brand .logo{height:clamp(28px,3.4vh,42px);width:auto;display:block;}
  .disp-brand h2{font-size:clamp(15px,1.7vh,22px);margin:0;font-weight:600;color:#EFE9DA;}
  .disp-clock{text-align:left;opacity:0.85;}
  .disp-clock .time{font-size:clamp(20px,2.6vh,30px);font-weight:700;font-family:'Rubik';letter-spacing:0.5px;}
  .disp-clock .date{font-size:clamp(11px,1.3vh,14px);color:#C9C2B3;}

  .stage-wrap{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:clamp(8px,1.5vh,18px) clamp(20px,5vw,80px);min-height:0;
  }
  #stage{
    width:100%;max-width:980px;flex:1;min-height:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;transition:opacity .5s ease;gap:clamp(10px,2vh,22px);
  }
  #stage.stage-show{opacity:1;}
  .slide-media{
    width:100%;flex:1;min-height:0;border-radius:18px;overflow:hidden;
    background:#0A0D0E;display:flex;align-items:center;justify-content:center;
    box-shadow:0 18px 60px rgba(0,0,0,0.45);
  }
  .slide-media img,.slide-media video,.slide-media iframe{width:100%;height:100%;object-fit:cover;border:0;}
  .slide-media.no-media{
    background:linear-gradient(135deg,var(--teal),#16332C);
  }
  .slide-textonly{
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    padding:40px;text-align:center;
  }
  .slide-textonly p{font-size:clamp(20px,3vh,34px);line-height:1.5;color:#F3EEE2;}
  .slide-caption{text-align:center;flex-shrink:0;}
  .slide-cat{
    display:inline-block;background:var(--coral);color:#fff;font-size:clamp(11px,1.2vh,14px);
    font-weight:700;padding:4px 14px;border-radius:30px;margin-bottom:10px;
  }
  .slide-title{
    font-size:clamp(26px,4.4vh,52px);line-height:1.25;margin:0;color:#fff;
  }
  .slide-text{font-size:clamp(14px,1.7vh,19px);color:#C9C2B3;margin:8px 0 0;max-width:780px;}

  .dots{display:flex;gap:8px;justify-content:center;flex-shrink:0;}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.25);transition:.25s;}
  .dot.active{background:var(--coral);width:22px;border-radius:5px;}

  .disp-empty{display:flex;flex-direction:column;align-items:center;gap:10px;color:#9A9486;}
  .disp-empty svg{width:60px;height:60px;opacity:0.5;}
  .disp-empty p{font-size:clamp(16px,2vh,20px);margin:0;}

  .ticker-bar{
    flex-shrink:0;display:flex;align-items:stretch;
    background:rgba(255,255,255,0.06);border-top:1px solid rgba(255,255,255,0.08);
    height:clamp(46px,6.2vh,66px);
  }
  .ticker-badge{
    flex-shrink:0;display:flex;align-items:center;gap:8px;
    background:var(--coral);color:#fff;font-weight:700;
    font-size:clamp(12px,1.4vh,16px);padding:0 clamp(14px,2vw,26px);white-space:nowrap;
  }
  .live-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .ticker-track-wrap{flex:1;overflow:hidden;display:flex;align-items:center;position:relative;}
  .ticker-track{display:flex;white-space:nowrap;will-change:transform;animation:marquee linear infinite;}
  .ticker-track span{font-size:clamp(14px,1.7vh,19px);color:#EFE9DA;padding-inline-end:60px;}
  @keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  .disp-controls{
    position:absolute;top:14px;left:14px;z-index:10;
  }
  .gear-btn{
    width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.08);
    display:flex;align-items:center;justify-content:center;opacity:0.35;transition:.2s;
  }
  .gear-btn:hover{opacity:0.9;background:rgba(255,255,255,0.16);}
  .gear-btn svg{width:18px;height:18px;color:#fff;}
  .disp-popover{
    position:absolute;top:46px;left:0;background:#1C2422;border-radius:12px;
    padding:14px;width:220px;box-shadow:var(--shadow-lg);
    border:1px solid rgba(255,255,255,0.08);
  }
  .disp-popover label{display:block;font-size:12px;color:#C9C2B3;margin-bottom:6px;}
  .disp-popover select{
    width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);
    background:#13181A;color:#fff;font-size:13.5px;margin-bottom:12px;
  }
  .disp-popover button{
    width:100%;background:var(--teal);color:#fff;padding:9px;border-radius:8px;
    font-size:13.5px;font-weight:600;
  }

  @media (max-width:640px){
    .cards-grid{grid-template-columns:1fr;}
    .field-row{flex-direction:column;gap:0;}
  }

  /* ===== TABS ===== */
  .tab-bar{display:flex;gap:4px;padding:18px 22px 0;background:var(--cream);}
  .tab-btn{
    padding:9px 20px;border-radius:10px 10px 0 0;font-size:14.5px;font-weight:600;
    color:#7A8077;border:1.5px solid transparent;border-bottom:none;cursor:pointer;background:transparent;
  }
  .tab-btn.active{background:var(--white);color:var(--teal);border-color:var(--sand-line);}

  /* ===== WEEK CALENDAR (admin) ===== */
  .cal-wrap{max-width:1180px;margin:0 auto;padding:0 22px 60px;}
  .cal-nav{display:flex;align-items:center;gap:12px;margin:20px 0 16px;}
  .cal-nav h3{margin:0;font-size:16px;font-weight:700;flex:1;text-align:center;}
  .cal-nav button{
    height:38px;padding:0 14px;border-radius:10px;border:1.5px solid var(--sand-line);
    background:var(--white);font-size:14px;font-weight:600;cursor:pointer;color:var(--ink);
  }
  .cal-nav button:hover{background:var(--sand);}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .day-col{
    background:var(--white);border-radius:12px;border:1.5px solid var(--sand-line);
    padding:10px 8px;min-height:160px;display:flex;flex-direction:column;gap:6px;
  }
  .day-col.today{border-color:var(--teal);background:#F0F8F5;}
  .day-head{
    text-align:center;font-size:12px;font-weight:700;color:#7A8077;margin-bottom:4px;padding-bottom:6px;
    border-bottom:1px solid var(--sand);
  }
  .day-head .day-num{display:block;font-size:18px;font-weight:800;color:var(--ink);margin-top:2px;}
  .day-col.today .day-head .day-num{color:var(--teal);}
  .act-chip{
    font-size:11.5px;font-weight:600;padding:5px 8px;border-radius:8px;
    background:var(--sand);color:var(--ink);line-height:1.3;cursor:pointer;
    border:none;text-align:right;width:100%;
  }
  .act-chip:hover{opacity:0.8;}
  .act-chip .act-time{display:block;font-size:10.5px;color:var(--teal);font-weight:700;margin-bottom:1px;}
  .act-chip.regular{border-right:3px solid var(--teal);}
  .act-chip.special{border-right:3px solid var(--coral);}
  .add-act-btn{
    margin-top:auto;width:100%;padding:5px 0;border-radius:8px;border:1.5px dashed var(--sand-line);
    background:transparent;font-size:12px;color:#9A9486;cursor:pointer;
  }
  .add-act-btn:hover{background:var(--sand);color:var(--ink);}

  /* ===== SPLIT DISPLAY ===== */
  #displayRoot.split{flex-direction:row;flex-wrap:nowrap;}
  .disp-calendar-half{
    width:44%;flex-shrink:0;display:flex;flex-direction:column;
    border-left:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.03);
    overflow:hidden;
  }
  .disp-slides-half{
    flex:1;display:flex;flex-direction:column;overflow:hidden;
  }
  .disp-cal-head{
    padding:clamp(10px,1.6vh,20px) clamp(14px,2vw,28px);
    font-size:clamp(13px,1.5vh,17px);font-weight:700;color:#EFE9DA;
    border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
  }
  .disp-week-grid{
    flex:1;display:grid;grid-template-columns:repeat(7,1fr);
    gap:0;overflow:hidden;
    padding:clamp(6px,1vh,14px) clamp(8px,1.2vw,18px);
    gap:clamp(4px,.6vw,8px);
  }
  .disp-day-col{
    display:flex;flex-direction:column;gap:clamp(3px,.4vh,6px);
    background:rgba(255,255,255,0.04);border-radius:8px;padding:6px 5px;overflow:hidden;
  }
  .disp-day-col.today{background:rgba(63,162,127,0.14);outline:1px solid rgba(63,162,127,0.4);}
  .disp-day-hd{
    text-align:center;font-size:clamp(9px,1vh,12px);font-weight:700;color:#9A9486;
    padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;
  }
  .disp-day-hd .dn{display:block;font-size:clamp(13px,1.6vh,20px);font-weight:800;color:#EFE9DA;margin-top:1px;}
  .disp-day-col.today .disp-day-hd .dn{color:#5ECFAA;}
  .disp-act-item{
    font-size:clamp(8px,.9vh,11.5px);font-weight:600;padding:3px 5px;border-radius:5px;
    line-height:1.3;color:#D8D2C2;background:rgba(255,255,255,0.07);
    border-right:2px solid var(--teal-light);overflow:hidden;flex-shrink:0;
  }
  .disp-act-item.special{border-right-color:var(--coral);}
  .disp-act-item .at{display:block;font-size:clamp(7px,.8vh,10px);color:#9FDFC9;margin-bottom:1px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================

const JSONBIN_BIN = '6a4a071ada38895dfe2fff38';
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_BIN;

function raceWithTimeout(promise, ms){
  return new Promise((resolve) => {
    let settled = false;
    const timer = setTimeout(() => {
      if(!settled){ settled = true; resolve({status:'timeout'}); }
    }, ms);
    Promise.resolve(promise).then((value) => {
      if(!settled){ settled = true; clearTimeout(timer); resolve({status:'ok', value}); }
    }).catch((error) => {
      if(!settled){ settled = true; clearTimeout(timer); resolve({status:'error', error}); }
    });
  });
}

async function jsonbinGet(){
  const res = await fetch(JSONBIN_URL + '/latest', {
    headers: {'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': 'false'}
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function jsonbinSet(data){
  const res = await fetch(JSONBIN_URL, {
    method: 'PUT',
    headers: {'X-Master-Key': JSONBIN_KEY, 'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function loadData(){
  const outcome = await raceWithTimeout(jsonbinGet(), 8000);
  if(outcome.status === 'timeout'){
    showToast('טעינה איטית — נסו לרענן');
    return buildSeedData();
  } else if(outcome.status === 'error'){
    const seed = buildSeedData();
    await jsonbinSet(seed).catch(()=>{});
    return seed;
  }
  const parsed = outcome.value;
  if(!parsed || !parsed.messages){
    const seed = buildSeedData();
    await jsonbinSet(seed).catch(()=>{});
    return seed;
  }
  if(!parsed.settings) parsed.settings = buildSeedData().settings;
  if(!Array.isArray(parsed.messages)) parsed.messages = [];
  if(!Array.isArray(parsed.categories) || !parsed.categories.length){
    const fromMessages = Array.from(new Set(parsed.messages.map(m=>m.category||'כללי')));
    parsed.categories = fromMessages.length ? fromMessages : ['כללי'];
    if(!parsed.categories.includes('כללי')) parsed.categories.push('כללי');
  }
  return parsed;
}

async function saveData(){
  const outcome = await raceWithTimeout(jsonbinSet(state.data), 6000);

}

function uid(){ return 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// Reads an image file, shrinks it to a reasonable size, and returns a JPEG data URI.
// This is the "upload" workaround: the artifact's storage only holds text, so we turn
// the picture into a (size-limited) text string that an <img> tag can still display.
function encodeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('קריאת הקובץ נכשלה'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('לא ניתן לפתוח את הקובץ כתמונה'));
      img.onload = () => {
        let width = img.naturalWidth, height = img.naturalHeight;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleImageUpload(inputEl){
  const file = inputEl.files && inputEl.files[0];
  const statusEl = document.getElementById('imageUploadStatus');
  const urlInput = document.getElementById('mediaUrlHidden');
  if(!file) return;
  if(!file.type.startsWith('image/')){
    if(statusEl) statusEl.textContent = 'יש לבחור קובץ תמונה (jpg/png/וכו׳)';
    return;
  }
  if(statusEl) statusEl.textContent = 'מעבד את התמונה...';
  try{
    let dataUri = await encodeImageFile(file, 1920, 0.88);
    if(dataUri.length > 900000){
      dataUri = await encodeImageFile(file, 1280, 0.78);
    }
    if(urlInput) urlInput.value = dataUri;
    const sizeKB = Math.round(dataUri.length/1024);
    if(statusEl) statusEl.textContent = 'התמונה מוכנה (כ-' + sizeKB + 'KB) — אפשר ללחוץ על "הוספת הודעה"';
  }catch(err){
    if(statusEl) statusEl.textContent = 'שגיאה בעיבוד התמונה: ' + err.message;
  }
}

function isActiveToday(m){
  const today = todayISO(0);
  if(!m.active) return false;
  if(m.startDate && m.startDate > today) return false;

  return true;
}

function getStatus(m){
  const today = todayISO(0);
  if(!m.active) return {label:'מושבת', cls:'status-off'};
  if(m.startDate && m.startDate > today) return {label:'מתוזמן', cls:'status-scheduled'};
  if(m.endDate && m.endDate < today) return {label:'הסתיים', cls:'status-ended'};
  return {label:'פעיל', cls:'status-active'};
}

function youtubeId(url){
  try{
    const u = new URL(url);
    const host = u.hostname.replace(/^www\.|^m\./,'');
    if(host==='youtu.be'){
      return u.pathname.split('/').filter(Boolean)[0] || null;
    }
    if(host==='youtube.com' || host==='youtube-nocookie.com'){
      if(u.pathname==='/watch'){
        return u.searchParams.get('v');
      }
      const parts = u.pathname.split('/').filter(Boolean);
      if(parts[0]==='embed' || parts[0]==='shorts' || parts[0]==='live'){
        return parts[1] || null;
      }
    }
  }catch(e){ /* not a parseable absolute URL */ }
  return null;
}

const DAY_NAMES = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const DAY_NAMES_SHORT = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];

function getWeekStart(offsetWeeks=0){
  const d = new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - day + offsetWeeks * 7);
  return d;
}

function getWeekDates(offsetWeeks=0){
  const start = getWeekStart(offsetWeeks);
  return Array.from({length:7}, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return d;
  });
}

function isoDate(d){ return localDateStr(d); }

// Reads calendar entries from messages (messages that have calType set)
function getActivitiesForDay(date){
  if(!state.data || !state.data.messages) return [];
  const dayNum = date.getDay();
  const iso = isoDate(date);
  return state.data.messages
    .filter(m => m.active !== false && isActiveToday(m) && m.calType && (
      (m.calType === 'regular' && Array.isArray(m.calDays) && m.calDays.includes(dayNum) &&
       (!m.endDate || iso <= m.endDate)) ||
      (m.calType === 'special' && (m.calDate || m.startDate) === iso)
    ))
    .sort((a,b) => (a.calTime||'00:00').localeCompare(b.calTime||'00:00'));
}

async function submitMessageForm(form){
  // Sync visible URL text field → hidden input before reading FormData
  const textInput = document.getElementById('mediaUrlText');
  const hiddenInput = document.getElementById('mediaUrlHidden');
  if(textInput && hiddenInput){
    const urlRow = document.getElementById('urlInputRow');
    if(urlRow && urlRow.style.display !== 'none') hiddenInput.value = textInput.value;
  }
  const fd = new FormData(form);
  const titleInput = form.querySelector('input[name="title"]');
  const title = (fd.get('title') || '').trim();
  const mediaType = fd.get('mediaType');
  const mediaUrl = (fd.get('mediaUrl') || '').trim();
  const errBox = document.getElementById('formError');

  function showError(msg){
    errBox.textContent = msg;
    try{ errBox.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){ /* not critical if this fails */ }
  }

  if(!title){ showError('כותרת היא שדה חובה'); if(titleInput) titleInput.focus(); return; }
  if(mediaType!=='none' && !mediaUrl){ showError('נדרש קישור עבור סוג המדיה שנבחר'); return; }
  const startDate = fd.get('startDate') || null;
  const endDate = fd.get('endDate') || null;
  if(startDate && endDate && endDate < startDate){ showError('תאריך הסיום חייב להיות אחרי תאריך ההתחלה'); return; }
  errBox.textContent = '';

  const durationRaw = fd.get('durationSeconds');
  const payload = {
    title,
    text: (fd.get('text') || '').trim(),
    category: (fd.get('category') || '').trim() || 'כללי',
    mediaType,
    mediaUrl,
    startDate,
    endDate,
    durationSeconds: durationRaw ? parseInt(durationRaw,10) : null,
    active: fd.get('active') === 'on',
    calType: fd.get('calType') || 'none',
    calDays: [0,1,2,3,4,5,6].filter(i => fd.get('calDay_'+i) === 'on'),
    calTime: fd.get('calTime') || '',
    calDate: null // special events use startDate
  };

  if(state.editingId){
    const idx = state.data.messages.findIndex(m=>m.id===state.editingId);
    if(idx>-1) state.data.messages[idx] = {...state.data.messages[idx], ...payload};
  } else {
    const maxOrder = state.data.messages.reduce((mx,m)=>Math.max(mx, m.order||0), 0);
    state.data.messages.push({id:uid(), order:maxOrder+1, ...payload});
  }
  await saveData();
  showToast(state.editingId ? 'ההודעה עודכנה' : 'ההודעה נוספה');
  closeModal();
}

async function moveOrder(id, dir){
  const sorted = [...state.data.messages].sort((a,b)=>(a.order||0)-(b.order||0));
  const idx = sorted.findIndex(m=>m.id===id);
  const swapIdx = idx + dir;
  if(swapIdx<0 || swapIdx>=sorted.length) return;
  const a = sorted[idx], b = sorted[swapIdx];
  const tmp = a.order; a.order = b.order; b.order = tmp;
  await saveData();
  renderApp();
}

function importData(file){

      const parsed = JSON.parse(e.target.result);
      if(!parsed.messages || !Array.isArray(parsed.messages)){
        showToast('קובץ לא תקין — לא נמצאו הודעות'); return;
      }
      if(!Array.isArray(parsed.activities)) parsed.activities = [];
      if(!Array.isArray(parsed.categories)) parsed.categories = ['כללי'];
      if(!parsed.settings) parsed.settings = buildSeedData().settings;
      state.data = parsed;
      await saveData();
      closeModal();
      showToast('הנתונים שוחזרו בהצלחה (' + parsed.messages.length + ' הודעות, ' + parsed.activities.length + ' פעילויות)');
      renderApp();

  };
  reader.readAsText(file);
}

  let list = [...state.data.messages].sort((a,b)=>(a.order||0)-(b.order||0));
  if(filterCat!=='all') list = list.filter(m=>(m.category||'כללי')===filterCat);

  const cardsHtml = list.length ? list.map(m=>{
    const st = getStatus(m);
    let mediaInner;
    if(m.mediaType==='image' && m.mediaUrl){
      mediaInner = '<img src="'+escapeHtml(m.mediaUrl)+'" alt="">';
    } else if((m.mediaType==='video') && m.mediaUrl){
      mediaInner = '<video src="'+escapeHtml(m.mediaUrl)+'" muted></video>';
    } else if(m.mediaType==='youtube' && m.mediaUrl && youtubeId(m.mediaUrl)){
      mediaInner = '<img src="https://img.youtube.com/vi/'+youtubeId(m.mediaUrl)+'/hqdefault.jpg" alt="">';
    } else {
      mediaInner = '<div class="media-empty">'+ICONS.image+'</div>';
    }
    return (
      '<div class="card">'+
        '<div class="card-media">'+mediaInner+
          '<span class="card-badge '+st.cls+'">'+st.label+'</span>'+
        '</div>'+
        '<div class="card-body">'+
          '<span class="card-cat">'+escapeHtml(m.category||'כללי')+'</span>'+
          '<h3 class="card-title">'+escapeHtml(m.title)+'</h3>'+
          (m.text ? '<p class="card-text">'+escapeHtml(m.text)+'</p>' : '')+
          '<div class="card-dates">'+
            (m.startDate ? fmtDate(m.startDate) : 'תמיד') + ' – ' + (m.endDate ? fmtDate(m.endDate) : 'ללא הגבלה')+
          '</div>'+
        '</div>'+
        '<div class="card-actions">'+
          '<div class="group">'+
            '<button class="btn-icon" title="הזז למעלה" data-action="moveOrder" data-id="'+m.id+'" data-dir="-1">'+ICONS.up+'</button>'+
            '<button class="btn-icon" title="הזז למטה" data-action="moveOrder" data-id="'+m.id+'" data-dir="1">'+ICONS.down+'</button>'+
          '</div>'+
          '<div class="group">'+
            '<button class="btn-icon" title="הפעלה/השבתה" data-action="toggleActive" data-id="'+m.id+'">'+ICONS.power+'</button>'+
            '<button class="btn-icon" title="עריכה" data-action="openEditModal" data-id="'+m.id+'">'+ICONS.edit+'</button>'+
            '<button class="btn-icon" title="מחיקה" data-action="askDelete" data-id="'+m.id+'">'+ICONS.trash+'</button>'+
          '</div>'+
        '</div>'+
      '</div>'
    );
  }).join('') : (
    '<div class="empty-state" style="grid-column:1/-1;">'+ICONS.inbox+
    '<h3>אין עדיין הודעות</h3><p>הוסיפו הודעה ראשונה שתוצג על מסך החוגים</p>'+
    '<button class="btn btn-coral" data-action="openAddModal">'+ICONS.plus+' הוסף הודעה</button>'+
    '</div>'
  );

  const topbar = (
    '<div class="topbar"><div class="topbar-inner">'+
      '<div class="brand"><img class="brand-logo" src="'+LOGO_DATA_URI+'" alt="לוגו"><div><h1>'+escapeHtml(state.data.settings.screenName)+'</h1><span class="sub">ניהול · '+BUILD_TAG+'</span></div></div>'+
      '<div class="topbar-actions">'+
        '<button class="btn btn-ghost-light" data-action="openSettings">'+ICONS.gear+' הגדרות</button>'+
        '<button class="btn btn-coral" data-action="goToDisplay" data-cat="all">'+ICONS.monitor+' מסך תצוגה</button>'+
      '</div>'+
    '</div></div>'
  );

  const tabs = (
    '<div class="tab-bar">'+
      '<button class="tab-btn'+(state.adminTab==='messages'?' active':'')+'" data-action="switchTab" data-tab="messages">📋 הודעות</button>'+
      '<button class="tab-btn'+(state.adminTab==='calendar'?' active':'')+'" data-action="switchTab" data-tab="calendar">📅 לוח פעילויות</button>'+
    '</div>'
  );

  if(state.adminTab === 'calendar'){
    return topbar + tabs + renderCalendarAdmin();
  }

  return (
    topbar + tabs +
    '<div class="admin-wrap">'+
      '<div class="toolbar">'+
        '<div class="toolbar-left">'+
          '<button class="btn btn-coral" data-action="openAddModal">'+ICONS.plus+' הודעה חדשה</button>'+
          '<select class="filter-select" data-role="admin-filter">'+
            '<option value="all"'+(filterCat==='all'?' selected':'')+'>כל הקטגוריות</option>'+
            cats.map(c=>'<option value="'+escapeHtml(c)+'"'+(filterCat===c?' selected':'')+'>'+escapeHtml(c)+'</option>').join('')+
          '</select>'+
        '</div>'+
        '<div style="font-size:13px;color:#8A8378;">'+list.length+' הודעות מוצגות</div>'+
      '</div>'+
      '<div class="cards-grid">'+cardsHtml+'</div>'+
    '</div>'
  );
}

function renderCalendarAdmin(){
  const dates = getWeekDates(state.calWeekOffset);
  const todayIso = todayISO(0);
  const weekStart = isoDate(dates[0]);
  const weekEnd = isoDate(dates[6]);

  const cols = dates.map((d, dayIdx) => {
    const iso = isoDate(d);
    const isToday = iso === todayIso;
    const acts = getActivitiesForDay(d);
    return (
      '<div class="day-col'+(isToday?' today':'')+'">'+
        '<div class="day-head">'+DAY_NAMES[dayIdx]+'<span class="day-num">'+d.getDate()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'</span></div>'+
        acts.map(a =>
          '<button class="act-chip '+(a.calType||'regular')+'" data-action="openEditModal" data-id="'+a.id+'">'+
            (a.calTime ? '<span class="act-time">'+a.calTime+'</span>' : '')+
            escapeHtml(a.title)+
          '</button>'
        ).join('')+
        (acts.length === 0 ? '<div style="font-size:11px;color:#C0BAB0;text-align:center;padding:8px 0;">ריק</div>' : '')+
      '</div>'
    );
  }).join('');

  const label = state.calWeekOffset === 0 ? 'השבוע הנוכחי' :
                state.calWeekOffset === 1 ? 'שבוע הבא' :
                state.calWeekOffset === -1 ? 'שבוע שעבר' :
                weekStart + ' – ' + weekEnd;

  return (
    '<div class="cal-wrap">'+
      '<p style="font-size:13px;color:#8A8378;margin:16px 0 4px;">לחיצה על פעילות פותחת את ההודעה לעריכה, שם ניתן לשנות את הגדרות הלוח</p>'+
      '<div class="cal-nav">'+
        '<button data-action="calWeek" data-dir="-1">‹ הקודם</button>'+
        '<h3>'+label+'</h3>'+
        '<button data-action="calWeek" data-dir="1">הבא ›</button>'+
        (state.calWeekOffset !== 0 ? '<button data-action="calWeek" data-dir="0" style="background:var(--teal);color:#fff;border-color:var(--teal);">היום</button>' : '')+
      '</div>'+
      '<div class="week-grid">'+cols+'</div>'+
    '</div>'
  );
}

function slideMediaHtml(m){
  if(m.mediaType==='image' && m.mediaUrl){
    return '<div class="slide-media"><img src="'+escapeHtml(m.mediaUrl)+'" alt=""></div>';
  }
  if(m.mediaType==='youtube' && m.mediaUrl){
    const yid = youtubeId(m.mediaUrl);
    if(yid){
      return (
        '<div class="slide-media" style="position:relative;background:#000;">'+
          '<img src="https://img.youtube.com/vi/'+yid+'/maxresdefault.jpg" '+
               'onerror="this.src=\'https://img.youtube.com/vi/'+yid+'/hqdefault.jpg\'" '+
               'alt="" style="width:100%;height:100%;object-fit:cover;">'+
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.28);">'+
            '<div style="width:clamp(56px,8vh,90px);height:clamp(56px,8vh,90px);border-radius:50%;background:rgba(255,40,40,0.92);'+
                        'display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,0.4);">'+
              '<svg viewBox="0 0 24 24" fill="white" style="width:45%;height:45%;margin-right:-8%"><path d="M8 5v14l11-7z"/></svg>'+
            '</div>'+
          '</div>'+
        '</div>'
      );
    }
  }
  if(m.mediaType==='video' && m.mediaUrl){
    return '<div class="slide-media"><video src="'+escapeHtml(m.mediaUrl)+'" autoplay muted loop playsinline></video></div>';
  }
  return (
    '<div class="slide-media no-media"><div class="slide-textonly"><p>'+escapeHtml(m.text||m.title)+'</p></div></div>'
  );
}

function slideHTML(m){
  const showCaptionBlock = !(m.mediaType==='none');
  return (
    slideMediaHtml(m)+
    (showCaptionBlock ?
      '<div class="slide-caption">'+
        '<span class="slide-cat">'+escapeHtml(m.category||'כללי')+'</span>'+
        '<h3 class="slide-title display-face">'+escapeHtml(m.title)+'</h3>'+
        (m.text ? '<p class="slide-text">'+escapeHtml(m.text)+'</p>' : '')+
      '</div>' : '')
  );
}

function emptyStageHTML(){
  return '<div class="disp-empty">'+ICONS.megaphone+'<p>אין הודעות פעילות כרגע</p></div>';
}

function renderStageAndDots(){
  const stageEl = document.getElementById('stage');
  const dotsEl = document.getElementById('dots');
  if(!stageEl) return;
  const list = getActiveMessagesForDisplay();

  if(list.length===0){
    stageEl.innerHTML = emptyStageHTML();
    stageEl.classList.add('stage-show');
    if(dotsEl) dotsEl.innerHTML = '';
    return;
  }
  if(currentSlideIndex >= list.length) currentSlideIndex = 0;
  const m = list[currentSlideIndex];
  stageEl.innerHTML = slideHTML(m);
  requestAnimationFrame(()=>stageEl.classList.add('stage-show'));
  if(dotsEl){
    dotsEl.innerHTML = list.map((_,i)=>'<span class="dot'+(i===currentSlideIndex?' active':'')+'"></span>').join('');
  }
}

function renderTicker(){
  const track = document.getElementById('tickerTrack');
  if(!track) return;
  const list = getActiveMessagesForDisplay();
  const speedMap = {slow:40, medium:70, fast:110};
  const speed = speedMap[state.data.settings.tickerSpeed] || 70;

  if(list.length===0){
    track.innerHTML = '<span>אין הודעות להצגה כרגע</span>';
    track.style.animation = 'none';
    return;
  }
  const text = list.map(m => m.title + (m.text ? ' — ' + m.text : '')).join('   •   ');
  track.innerHTML = '<span>'+escapeHtml(text)+'</span><span>'+escapeHtml(text)+'</span>';
  // estimate width: ~9px per character at current font size, duration = distance / speed(px per sec)
  const approxWidth = text.length * 11;
  const duration = Math.max(approxWidth / speed, 8);
  track.style.animation = 'marquee ' + duration + 's linear infinite';
}

function updateClock(){
  const t = document.getElementById('clockTime');
  const d = document.getElementById('clockDate');
  if(!t || !d) return;
  const now = new Date();
  t.textContent = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
  d.textContent = now.toLocaleDateString('he-IL', {weekday:'long', day:'numeric', month:'long'});
}

function scheduleNextSlide(){
  clearTimeout(rotationTimer);
  const list = getActiveMessagesForDisplay();
  if(list.length===0){
    rotationTimer = setTimeout(scheduleNextSlide, 5000);
    return;
  }
  const m = list[currentSlideIndex % list.length];
  const dur = (m.durationSeconds || state.data.settings.defaultDuration || 10) * 1000;
  rotationTimer = setTimeout(()=>{
    const stageEl = document.getElementById('stage');
    if(stageEl) stageEl.classList.remove('stage-show');
    setTimeout(()=>{
      currentSlideIndex = (currentSlideIndex + 1) % Math.max(getActiveMessagesForDisplay().length,1);
      renderStageAndDots();
      scheduleNextSlide();
    }, 380);
  }, Math.max(dur,3000));
}


function startDisplayLoops(){
  currentSlideIndex = 0;
  renderStageAndDots();
  renderTicker();
  updateClock();
  scheduleNextSlide();
  clockInterval = setInterval(updateClock, 1000);
  pollInterval = setInterval(refreshDataSilently, 20000);
}
function stopDisplayLoops(){
  clearTimeout(rotationTimer);
  clearInterval(clockInterval);
  clearInterval(pollInterval);
  rotationTimer = clockInterval = pollInterval = null;
}

/* ============================================================
   MAIN RENDER
============================================================ */
function renderApp(){
  const app = document.getElementById('app');
  if(!state.data){ app.innerHTML = '<div style="padding:60px;text-align:center;color:#8A8378;">טוען נתונים…</div>'; return; }

  let html = state.view==='display' ? renderDisplay() : renderAdmin();
  if(state.modal==='edit') html += renderEditModal();
  if(state.modal==='settings') html += renderSettingsModal();
  if(state.modal==='delete') html += renderDeleteModal();
  app.innerHTML = html;

  if(state.view==='display'){
    // loops are (re)started by caller; just make sure ticker/stage reflect current state on a fresh render (e.g. popover toggle)
    renderStageAndDots();
    renderTicker();
    updateClock();
  }
}

/* ============================================================
   EVENT DELEGATION
   (No inline onclick/onsubmit/onchange attributes anywhere in this
   app — all events are bound here via addEventListener, since some
   hosting environments block inline event-handler attributes.)
============================================================ */
const ACTIONS = {
  moveOrder: (el) => moveOrder(el.dataset.id, parseInt(el.dataset.dir,10)),
  toggleActive: (el) => toggleActive(el.dataset.id),
  openEditModal: (el) => openEditModal(el.dataset.id),
  askDelete: (el) => askDelete(el.dataset.id),
  openAddModal: () => openAddModal(),
  openSettings: () => { state.modal = 'settings'; renderApp(); },
  goToDisplay: (el) => goToDisplay(el.dataset.cat || 'all'),
  closeModal: () => closeModal(),
  triggerSubmit: (el) => {
    const f = document.getElementById(el.dataset.form);
    if(!f){ return; }
    if(f.id === 'msgForm') submitMessageForm(f);
    else if(f.id === 'settingsForm') saveSettingsForm(f);
  },
  removeCategoryFromList: (el) => removeCategoryFromList(el.dataset.cat),
  confirmDelete: () => confirmDelete(),
  toggleDisplayPopover: () => { state.popoverOpen = !state.popoverOpen; renderApp(); },
  goToAdmin: () => goToAdmin(),
  exportData: () => exportData(),
  switchTab: (el) => { state.adminTab = el.dataset.tab; renderApp(); },
  calWeek: (el) => { state.calWeekOffset = parseInt(el.dataset.dir, 10); renderApp(); },
  submitAddCategory: (el) => {
    const form = el.closest('form');
    const input = form.querySelector('input[name="newCat"]');
    addCategoryToList(input.value);
    input.value = '';
  }
};

document.addEventListener('click', (e) => {
  // Click on the dimmed backdrop itself (not its modal content) closes the modal.
  if(e.target.classList && e.target.classList.contains('overlay')){
    closeModal();
    return;
  }
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  if(ACTIONS[action]) ACTIONS[action](el);
});

document.addEventListener('submit', (e) => {
  if(e.target.id === 'msgForm'){
    e.preventDefault();
    submitMessageForm(e.target);
    } else if(e.target.id === 'settingsForm'){
    e.preventDefault();
    saveSettingsForm(e.target);
  } else if(e.target.id === 'addCatForm'){
    e.preventDefault();
    const fd = new FormData(e.target);
    addCategoryToList(fd.get('newCat'));
    e.target.reset();
  }
});

document.addEventListener('change', (e) => {
  if(e.target.name === 'mediaType'){
    const field = document.getElementById('mediaUrlField');
    const urlRow = document.getElementById('urlInputRow');
    const uploadRow = document.getElementById('imageUploadRow');
    const isImage = e.target.value === 'image';
    const isNone = e.target.value === 'none';
    if(field) field.style.display = isNone ? 'none' : 'block';
    if(urlRow) urlRow.style.display = isImage ? 'none' : 'block';
    if(uploadRow) uploadRow.style.display = isImage ? 'block' : 'none';
    // when switching to non-image, clear the hidden input so old image data doesn't linger
    const hiddenInput = document.getElementById('mediaUrlHidden');
    if(!isImage && hiddenInput) hiddenInput.value = '';
  } else if(e.target.id === 'importFileInput'){
    if(e.target.files && e.target.files[0]) importData(e.target.files[0]);
  } else if(e.target.id === 'imageUploadInput'){
    handleImageUpload(e.target);
  } else if(e.target.matches('[data-role="cal-type-toggle"]')){
    const v = e.target.value;
    const rf = document.getElementById('calRegularFields');
    const sf = document.getElementById('calSpecialFields');
    if(rf) rf.style.display = v === 'regular' ? 'block' : 'none';
    if(sf) sf.style.display = v === 'special' ? 'block' : 'none';
  } else if(e.target.matches('select[data-role="admin-filter"]')){
    state._adminFilter = e.target.value;
    renderApp();
  } else if(e.target.matches('select[data-role="display-cat-filter"]')){
    goToDisplay(e.target.value);
  }
});

/* ============================================================
   INIT
============================================================ */
async function init(){
  const r = readHash();
  state.view = r.view;
  state.displayCategory = r.category;
  state.data = await loadData();
  renderApp();
  if(state.view==='display') startDisplayLoops();
}
init();
</script>
